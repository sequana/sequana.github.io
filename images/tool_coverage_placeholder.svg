<svg xmlns="http://www.w3.org/2000/svg" width="360" height="160" viewBox="0 0 360 160">
  <rect width="360" height="160" fill="#e8f4f8"/>
  <!-- Genome coverage chart illustration -->
  <rect x="20" y="130" width="320" height="2" fill="#aaa"/>
  <!-- Coverage area fill -->
  <polygon points="20,120 50,80 80,60 110,40 140,55 170,30 200,45 230,65 260,50 290,70 320,90 340,110 340,132 20,132"
           fill="#a8d5e2" opacity="0.7"/>
  <!-- Coverage line -->
  <polyline points="20,120 50,80 80,60 110,40 140,55 170,30 200,45 230,65 260,50 290,70 320,90 340,110"
            fill="none" stroke="#1a7a9a" stroke-width="2.5"/>
  <!-- Median line -->
  <line x1="20" y1="75" x2="340" y2="75" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Threshold lines -->
  <line x1="20" y1="45" x2="340" y2="45" stroke="#e53935" stroke-width="1.2" stroke-dasharray="4,4"/>
  <line x1="20" y1="115" x2="340" y2="115" stroke="#e53935" stroke-width="1.2" stroke-dasharray="4,4"/>
  <!-- Label -->
  <text x="180" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Sequana Coverage — genome depth analysis</text>
</svg>
