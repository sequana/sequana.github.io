<svg xmlns="http://www.w3.org/2000/svg" width="360" height="160" viewBox="0 0 360 160">
  <rect width="360" height="160" fill="#eef7ee"/>
  <!-- Window chrome -->
  <rect x="20" y="15" width="320" height="125" rx="6" fill="#fff" stroke="#b0c4b0" stroke-width="1.5"/>
  <rect x="20" y="15" width="320" height="26" rx="6" fill="#159957"/>
  <rect x="20" y="28" width="320" height="13" fill="#159957"/>
  <!-- Title bar dots -->
  <circle cx="38" cy="28" r="5" fill="#ff5f57"/>
  <circle cx="56" cy="28" r="5" fill="#febc2e"/>
  <circle cx="74" cy="28" r="5" fill="#28c840"/>
  <text x="180" y="33" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">Sequanix — GUI</text>
  <!-- Sidebar -->
  <rect x="28" y="49" width="80" height="84" rx="3" fill="#f0f4f0" stroke="#c8d8c8" stroke-width="1"/>
  <rect x="34" y="56" width="68" height="10" rx="2" fill="#d0e8d0"/>
  <rect x="34" y="72" width="68" height="10" rx="2" fill="#159957" opacity="0.8"/>
  <rect x="34" y="88" width="68" height="10" rx="2" fill="#d0e8d0"/>
  <rect x="34" y="104" width="68" height="10" rx="2" fill="#d0e8d0"/>
  <!-- Main panel -->
  <rect x="116" y="49" width="216" height="84" rx="3" fill="#f8faf8" stroke="#c8d8c8" stroke-width="1"/>
  <rect x="124" y="57" width="60" height="8" rx="2" fill="#ddd"/>
  <rect x="190" y="57" width="130" height="8" rx="2" fill="#eee"/>
  <rect x="124" y="73" width="60" height="8" rx="2" fill="#ddd"/>
  <rect x="190" y="73" width="130" height="8" rx="2" fill="#eee"/>
  <rect x="124" y="89" width="60" height="8" rx="2" fill="#ddd"/>
  <rect x="190" y="89" width="130" height="8" rx="2" fill="#eee"/>
  <!-- Run button -->
  <rect x="252" y="112" width="72" height="16" rx="4" fill="#159957"/>
  <text x="288" y="124" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff">▶ Run</text>
  <!-- Label -->
  <text x="180" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Sequanix — desktop GUI for Snakemake pipelines</text>
</svg>
